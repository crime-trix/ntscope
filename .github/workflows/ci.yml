name: ci

on:
  push:
  pull_request:

jobs:
  msvc:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A ${{ matrix.cmake_arch }} -DNTSCOPE_BUILD_EXAMPLES=ON -DNTSCOPE_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
